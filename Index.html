<!DOCTYPE html>
<html>
<head>
  <title>Pro Quiz</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #eef;
    }

    h1 {
      background: #0077cc;
      color: white;
      padding: 15px;
    }

    .box {
      background: white;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }

    .option {
      display: block;
      margin: 10px;
      padding: 10px;
      background: #ddd;
      border-radius: 5px;
      cursor: pointer;
    }

    .correct { background: green; color: white; }
    .wrong { background: red; color: white; }

    button {
      padding: 10px 15px;
      margin: 10px;
      border: none;
      background: orange;
      border-radius: 5px;
      cursor: pointer;
    }

    #timer {
      font-size: 18px;
      color: red;
    }
  </style>
</head>

<body>

<h1>🔥 Pro Quiz</h1>

<div class="box">
  <h2 id="question"></h2>
  <div id="options"></div>

  <p id="timer">Time: 10</p>

  <button onclick="nextQuestion()">Next ➡️</button>
  <button onclick="restartQuiz()">Restart 🔄</button>
</div>

<script>
let questions = [
  {q:"A for ?", options:["Ball","Apple","Cat","Dog"], answer:"Apple"},
  {q:"2 + 3 = ?", options:["4","5","6","7"], answer:"5"},
  {q:"Sun rises in the ?", options:["West","East","North","South"], answer:"East"}
];

let index = 0;
let score = 0;
let time = 10;
let timer;

let correctSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
let wrongSound = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");

function loadQuestion() {
  clearInterval(timer);
  time = 10;
  document.getElementById("timer").innerText = "Time: " + time;

  timer = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = "Time: " + time;

    if(time === 0){
      nextQuestion();
    }
  },1000);

  let q = questions[index];
  document.getElementById("question").innerText = q.q;

  let html = "";
  q.options.forEach(opt => {
    html += `<div class="option" onclick="check(this,'${opt}')">${opt}</div>`;
  });

  document.getElementById("options").innerHTML = html;
}

function check(element, selected) {
  let correct = questions[index].answer;

  if(selected === correct){
    element.classList.add("correct");
    correctSound.play();
    score++;
  } else {
    element.classList.add("wrong");
    wrongSound.play();
  }
}

function nextQuestion() {
  index++;
  if(index < questions.length){
    loadQuestion();
  } else {
    document.body.innerHTML =
      "<h1>🎉 Quiz Finished</h1><h2>Score: " + score + "</h2><button onclick='location.reload()'>Restart</button>";
  }
}

function restartQuiz(){
  index = 0;
  score = 0;
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
